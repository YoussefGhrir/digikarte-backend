spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- HikariCP connection pool tuning (meilleures perfs sous charge) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

jwt.secret=DigiKarteSecretKey2025TresLongPourSignerLesTokensJWT
jwt.expiration-ms=86400000

# Prod Heroku : Config Var FRONTEND_URL = URL de ton frontend (ex. https://digikarte.vercel.app)
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Upload photos (organisation logo, etc.) — accepter jusqu'à 15 Mo
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Stripe (LIVE production)
