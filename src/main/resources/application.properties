spring.application.name=digikarte
# Sur Heroku, le port doit venir de la variable d'environnement PORT
server.port=${PORT:8080}

# --- Base de données Postgres (Heroku RDS) : utilisée en local ET en prod ---
spring.datasource.url=jdbc:postgresql://cfj13tpj5rjn9.cluster-czz5s0kz4scl.eu-west-1.rds.amazonaws.com:5432/dd6092bajr4k45?sslmode=require
spring.datasource.username=u122reqbtbg9ov
spring.datasource.password=pdc5745aad3bf8e074a496a73473628d2a7caf363edba3fffd879c318e3261c6f
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- HikariCP connection pool tuning (meilleures perfs sous charge) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

jwt.secret=DigiKarteSecretKey2025TresLongPourSignerLesTokensJWT
jwt.expiration-ms=86400000

# --- Heroku Config Vars (noms recommandés, Spring les mappe automatiquement) ---
# FRONTEND_URL              → frontend.url (ex. https://digi-karte.com sans slash final)
# CORS_ALLOWED_ORIGIN_PATTERNS → cors.allowed-origin-patterns (ex. https://digi-karte.com,https://www.digi-karte.com)
# APP_ROUTE_LOCALE_FALLBACK → uniquement si le front n’envoie pas la langue (QR /api/menus/...). Pas de logique pays ici.
frontend.url=${FRONTEND_URL:https://digi-karte.com}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://digi-karte.com,https://www.digi-karte.com,https://digikarte-frontend.vercel.app}
app.route-locale.fallback=${APP_ROUTE_LOCALE_FALLBACK:de}

# Upload photos (organisation logo, etc.) — accepter jusqu'à 15 Mo
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Stripe (secrets via variables d'environnement / Heroku Config Vars)
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.price.monthly=${STRIPE_PRICE_MONTHLY:}
stripe.price.semiannual=${STRIPE_PRICE_SEMIANNUAL:}
stripe.price.yearly=${STRIPE_PRICE_YEARLY:}
