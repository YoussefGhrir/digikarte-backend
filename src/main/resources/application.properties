spring.application.name=digikarte
server.port=8080

# MySQL (XAMPP localhost:3306) - base digikarte déjà créée dans phpMyAdmin
spring.datasource.url=jdbc:mysql://localhost:3306/digikarte?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Europe/Paris
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=DigiKarteSecretKey2025TresLongPourSignerLesTokensJWT
jwt.expiration-ms=86400000

frontend.url=http://localhost:3000

# Upload photos (organisation logo, etc.) — accepter jusqu'à 15 Mo
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
