spring.application.name=digikarte
server.port=8080

# --- Base de données : uniquement PostgreSQL (Heroku) ---
# Aucune config locale : tout vient de la variable d'environnement DATABASE_URL.
# Heroku : injectée automatiquement. En dev sur ton PC : même URL (Heroku → Settings → Config Vars).
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=DigiKarteSecretKey2025TresLongPourSignerLesTokensJWT
jwt.expiration-ms=86400000

# Prod Heroku : Config Var FRONTEND_URL = URL de ton frontend (ex. https://digikarte.vercel.app)
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Upload photos (organisation logo, etc.) — accepter jusqu'à 15 Mo
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

